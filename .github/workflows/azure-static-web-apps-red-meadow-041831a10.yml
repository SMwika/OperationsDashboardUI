name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Install Node 22 on the runner to match project requirements
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # Install dependencies with --legacy-peer-deps to bypass
      # react-debounce-input@3.3.0 peer dependency conflict with React 19
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # Build the app — Vite compiles everything into /dist
      # dist/index.html will reference hashed /assets/main-xxxx.js (not main.tsx)
      - name: Build App
        run: npm run build

      # DEBUG: Verify dist output is correct before deploying.
      # Confirms index.html references compiled assets, not raw .tsx source files.
      # Remove this block once deployment is confirmed working.
      - name: Debug - Verify dist output
        run: |
          echo "=== dist/ root ==="
          ls -la dist/
          echo ""
          echo "=== dist/assets/ ==="
          ls -la dist/assets/ || echo "WARNING: No assets folder found!"
          echo ""
          echo "=== dist/index.html ==="
          cat dist/index.html
          echo ""
          echo "=== staticwebapp.config.json in dist ==="
          cat dist/staticwebapp.config.json || echo "WARNING: staticwebapp.config.json not found in dist!"

      # node_modules must be removed BEFORE deploy.
      # Azure SWA uploads the entire workspace — keeping node_modules
      # pushes the upload over the 250MB free plan limit (BadRequest error).
      - name: Remove node_modules
        run: rm -rf node_modules

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_MEADOW_041831A10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # app_location is repo root where index.html lives
          app_location: "/"
          api_location: ""
          # output_location is where Vite puts the compiled build
          output_location: "dist"
          # skip_app_build: true — tells Oryx NOT to run its own npm install.
          # We already built the app above; Oryx should only deploy /dist as-is.
          # Without this, Oryx runs a fresh npm install and fails on the
          # react-debounce-input peer dependency conflict with React 19.
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_MEADOW_041831A10 }}
          action: "close"
