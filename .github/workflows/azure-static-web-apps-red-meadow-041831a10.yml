name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Install Node 22 on the runner to match project requirements
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # Install with --legacy-peer-deps to bypass react-debounce-input@3.3.0
      # peer dependency conflict with React 19
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # Vite compiles src/main.tsx → dist/assets/main-xxxx.js
      # and rewrites dist/index.html to reference the hashed asset
      - name: Build App
        run: npm run build

      # DEBUG: Confirm dist/index.html references compiled /assets/*.js
      # and that staticwebapp.config.json was copied from /public to /dist
      - name: Debug - Verify dist output
        run: |
          echo "=== dist/ root ==="
          ls -la dist/
          echo ""
          echo "=== dist/assets/ ==="
          ls -la dist/assets/ || echo "WARNING: No assets folder found!"
          echo ""
          echo "=== dist/index.html ==="
          cat dist/index.html
          echo ""
          echo "=== staticwebapp.config.json in dist ==="
          cat dist/staticwebapp.config.json || echo "WARNING: staticwebapp.config.json not found in dist!"

      # Remove node_modules before deploy — Azure uploads the full workspace
      # and node_modules alone exceeds the 250MB free plan limit
      - name: Remove node_modules
        run: rm -rf node_modules

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_MEADOW_041831A10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"
          # app_artifact_location explicitly tells Azure to serve ONLY from dist/.
          # Without this, when skip_app_build is true, Azure may fall back to
          # serving raw source files from the repo root — causing the MIME type
          # error because it serves main.tsx instead of the compiled main-xxxx.js
          app_artifact_location: "dist"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_MEADOW_041831A10 }}
          action: "close"
